name: Class Announcement E2E Test

on:
  workflow_run:
    workflows: [ "Class Management E2E Test" ]
    types: [ completed ]
    branches: [ main ]

jobs:
  class-announcement-e2e:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        browser: [ chrome, firefox ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create staging.properties
        run: |
          mkdir -p src/test/resources/config
          cat <<EOF > src/test/resources/config/staging.properties
          baseApiUrl=${{ secrets.BASEAPIURL }}
          companyId=${{ secrets.COMPANYID }}
          validEmailAuth=${{ secrets.VALIDEMAILAUTH }}
          validPasswordAuth=${{ secrets.VALIDPASSWORDAUTH }}
          EOF

      - name: Set up Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@latest

      - name: Set up ChromeDriver
        if: matrix.browser == 'chrome'
        uses: nanasess/setup-chromedriver@v2

      - name: Set up Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@latest

      - name: Set up GeckoDriver
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-geckodriver@latest

      - name: Run Class Announcement E2E Tests
        run: ./gradlew test -Psuite=class_announcement-ui-ci.xml -Penv=staging -Pbrowser=${{ matrix.browser }}
        env:
          CHROMEDRIVER_PATH: ${{ matrix.browser == 'chrome' && '/usr/local/bin/chromedriver' || '' }}
          CHROME_BIN: ${{ matrix.browser == 'chrome' && '/usr/bin/google-chrome' || '' }}
          FIREFOX_BIN: ${{ matrix.browser == 'firefox' && steps.setup-firefox.outputs.firefox-path || '' }}

      - name: Send test report via email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Class Announcement E2E/UI Test Report - ${{ job.status }} - ${{ github.repository }}"
          to: ${{ secrets.MAIL_TO }}
          from: Dibimbing-LMS-B2B Automation Test Bot
          body: |
            Test run finished with status: ${{ job.status }}
            Browser: ${{ matrix.browser }}
            Module: Class Announcement 
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Triggered by: ${{ github.actor }}
            
            See attached ExtentReports HTML report here.
          attachments: reports/extent-report_*.html